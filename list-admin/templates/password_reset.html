<!doctype html>
<html lang="{{ g.language }}" data-theme="{{ g.theme }}">

<head>
    <meta charset="utf-8">
    <title>{{ t("reset_password") }} — {{ t("app_title") }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ app_version }}">
    <style>
        body.login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg);
        }

        .login-box {
            width: 100%;
            max-width: 360px;
            background: var(--panel);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .login-box h2 {
            margin: 0 0 10px;
            text-align: center;
        }

        .login-box form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .login-footer {
            margin-top: 10px;
            text-align: center;
            font-size: 13px;
            color: var(--muted);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .login-footer select {
            margin-top: 4px;
        }

        .login-meta {
            font-size: 12px;
            color: var(--muted);
        }

        .instructions {
            text-align: center;
            font-size: 14px;
            color: var(--muted);
        }
    </style>
</head>

<body class="login-page">
    <div class="login-box">
        <h2>{{ t("reset_password") }}</h2>
        <p class="instructions">{{ t("password_reset_instructions") }}</p>

        {% with msgs = get_flashed_messages(with_categories=true) %}
        {% if msgs %}
        <div class="flashwrap">
            {% for cat, msg in msgs %}
            <div class="flash {{ cat }}">{{ msg }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="post" action="{{ url_for('password_reset') }}">
            <input type="password" name="password" placeholder="{{ t('new_password_alt') }}" required autofocus>
            <input type="password" name="confirm_password" placeholder="{{ t('confirm_password') }}" required>
            <button type="submit" class="btn primary">{{ t("reset_password") }}</button>
        </form>

        <form method="get" action="{{ url_for('logout') }}">
            <button type="submit" class="btn" style="width:100%;">{{ t("logout") }}</button>
        </form>

        <div class="login-footer">
            <form method="post" action="{{ url_for('set_language') }}">
                {% set langs = t('languages') %}
                <select id="language" name="language" onchange="this.form.submit()">
                    {% for code, label in langs|dictsort(by='value') %}
                    <option value="{{ code }}" {% if g.language==code %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </form>

            <div class="login-meta">
                {{ app_version }} &bull; <script>document.write(new Date().getFullYear())</script> {{ app_author }}
            </div>
        </div>
    </div>
</body>

</html>
